<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuke Omni FIX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #0f0; --bg: #000; --gold: #ffcc00; --blue: #00ccff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Consolas', monospace; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--neon); text-align: center; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }
        
        /* Шапка */
        .header { background: #111; padding: 10px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; font-size: 0.7rem; height: 50px; align-items: center; z-index: 10; }
        #score { font-size: 2.2rem; font-weight: bold; margin: 15px 0; text-shadow: 0 0 10px var(--neon); height: 50px; }
        
        /* Екрани */
        .view { display: none; padding: 15px; height: calc(100vh - 130px); overflow-y: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        .view.active { display: block; }
        
        /* Картки та кнопки */
        .card { background: #0a0a0a; border: 1px solid var(--neon); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .btn { padding: 12px; background: var(--neon); color: #000; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; min-width: 90px; transition: 0.2s; }
        .btn:active { opacity: 0.7; transform: scale(0.95); }

        /* Навігація */
        .nav { display: flex; position: fixed; bottom: 0; width: 100%; background: #111; border-top: 1px solid var(--neon); height: 70px; z-index: 9999; }
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; font-size: 0.7rem; font-weight: bold; color: #555; }
        .nav-item.active { background: var(--neon); color: #000; }

        /* Маркет */
        .s-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-bottom: 30px; }
        .s-item { background: #0a0a0a; border: 1px solid #333; padding: 10px; border-radius: 10px; }
        .s-preview { width: 30px; height: 30px; margin: 0 auto 5px; border-radius: 50%; border: 1px solid #fff; }

        input { width: 100%; padding: 15px; background: #000; border: 2px solid var(--neon); color: #fff; border-radius: 12px; margin-bottom: 10px; text-align: center; outline: none; }
        
        .rocket-btn { margin-top: 20px; display: inline-block; cursor: pointer; touch-action: manipulation; }
        svg { filter: drop-shadow(0 0 10px var(--neon)); pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <div id="boost-st" style="color:var(--gold)">x1 BOOST</div>
    <div id="reb-info" style="color:var(--gold)">REBIRTHS: 0</div>
</div>

<div id="score">0</div>

<div id="v-game" class="view active">
    <div class="rocket-btn" onclick="doTap()">
        <svg width="200" height="200" viewBox="0 0 100 100">
            <path id="n-body" d="M50 5 C40 20 35 40 35 60 L35 85 L40 80 L50 95 L60 80 L65 85 L65 60 C65 40 60 20 50 5 Z" fill="currentColor" />
            <path d="M35 65 L25 80 L35 80 Z M65 65 L75 80 L65 80 Z" fill="currentColor" opacity="0.6"/>
        </svg>
    </div>
</div>

<div id="v-up" class="view">
    <div class="card"><div><b>Тап</b><br><small id="p-l">Lvl 1</small></div><button class="btn" onclick="buyU('p')">$<span id="p-c">100</span></button></div>
    <div class="card"><div><b>Авто</b><br><small id="a-l">Lvl 0</small></div><button class="btn" onclick="buyU('a')">$<span id="a-c">500</span></button></div>
    <div class="card" style="border-color:var(--gold)"><div><b>Ребірт</b><br><small>Скидання за х2 дохід</small></div><button class="btn" style="background:var(--gold)" onclick="rebirth()">$1M</button></div>
</div>

<div id="v-shop" class="view">
    <input type="text" id="p-in" placeholder="ВВЕДІТЬ КОД">
    <button class="btn" style="width:100%; margin-bottom:20px;" onclick="promo()">АКТИВУВАТИ</button>
    <div class="s-grid" id="s-grid"></div>
</div>

<div id="v-bonus" class="view">
    <button class="btn" style="width:100%; background:var(--blue); color:#fff; margin-bottom:15px;" onclick="ref()">🔗 РЕФЕРАЛЬНЕ ПОСИЛАННЯ</button>
    <button class="btn" style="width:100%; background:var(--gold)" onclick="daily()">🎁 ЩОДЕННИЙ БОНУС</button>
</div>

<div class="nav">
    <div id="btn-game" class="nav-item active" onclick="go('game')">ГРА</div>
    <div id="btn-up" class="nav-item" onclick="go('up')">АПГРЕЙДИ</div>
    <div id="btn-shop" class="nav-item" onclick="go('shop')">МАРКЕТ</div>
    <div id="btn-bonus" class="nav-item" onclick="go('bonus')">БОНУСИ</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    if(tg) { tg.expand(); tg.ready(); }

    // Глобальні дані гри
    let g = { 
        m: 0, p: 10, a: 0, r: 0, mult: 1, 
        pp: 100, ap: 500, pLvl: 1, aLvl: 0, 
        skin: '#0f0', owned: ['#0f0'], 
        last: 0, used: [] 
    };

    const colors = ['#0f0','#00ffaa','#00ccff','#0066ff','#5500ff','#a020f0','#ff00ff','#ff0066','#ff3333','#ff6600','#ffcc00','#ffff00','#ccff00','#88ff00','#44ff00','#ffffff','#aaaaaa','#555555','#1a1a1a','#3e2723','#d4af37','#e5e4e2','#b08d57','#708090','#008080','#ffb6c1','#4b0082','#800000','#000080','#2f4f4f'];

    // Перемикання вкладок
    function go(id) {
        const screens = ['game', 'up', 'shop', 'bonus'];
        screens.forEach(s => {
            document.getElementById('v-' + s).classList.remove('active');
            document.getElementById('btn-' + s).classList.remove('active');
        });
        document.getElementById('v-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    // Механіка тапу
    function doTap() {
        if(g.m === Infinity) return;
        g.m += (g.p * g.mult);
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        updateUI();
        save();
    }

    // Збереження
    function save() { localStorage.setItem('nuke_vFinal', JSON.stringify(g)); }
    
    // Оновлення інтерфейсу
    function updateUI() {
        document.getElementById('score').innerText = (g.m === Infinity) ? "INFINITY" : Math.floor(g.m).toLocaleString();
        document.getElementById('p-c').innerText = Math.floor(g.pp).toLocaleString();
        document.getElementById('a-c').innerText = Math.floor(g.ap).toLocaleString();
        document.getElementById('p-l').innerText = "Lvl " + g.pLvl;
        document.getElementById('a-l').innerText = "Lvl " + g.aLvl;
        document.getElementById('reb-info').innerText = "REBIRTHS: " + g.r;
        document.getElementById('boost-st').innerText = "x" + g.mult + " BOOST";
        
        // Стилізація під скін
        document.getElementById('n-body').setAttribute('fill', g.skin);
        document.documentElement.style.setProperty('--neon', g.skin);
        
        // Рендер маркету
        let sHtml = '';
        colors.forEach((c, i) => {
            let has = g.owned.includes(c);
            let pr = i * 2000000;
            let btnText = has ? (g.skin === c ? 'USE' : 'SET') : (pr/1000000 + 'M');
            let action = has ? `setS('${c}')` : `buyS('${c}', ${pr})`;
            
            sHtml += `<div class="s-item">
                <div class="s-preview" style="background:${c}"></div>
                <button class="btn" style="min-width:55px;padding:4px;font-size:0.5rem" onclick="${action}">${btnText}</button>
            </div>`;
        });
        document.getElementById('s-grid').innerHTML = sHtml;
    }

    // Купівля апгрейдів
    function buyU(t) {
        if(t === 'p' && g.m >= g.pp) { g.m -= g.pp; g.p += 5; g.pLvl++; g.pp *= 2.2; }
        else if(t === 'a' && g.m >= g.ap) { g.m -= g.ap; g.a += 10; g.aLvl++; g.ap *= 2.5; }
        updateUI(); save();
    }

    // Система ПРОМОКОДІВ (ОДНОРАЗОВІ)
    function promo() {
        let v = document.getElementById('p-in').value.toUpperCase().trim();
        if (!v) return;

        if (g.used && g.used.includes(v)) {
            alert("Цей код вже використано!");
            return;
        }

        let ok = true;
        if(v === "RICH") g.m += 100000;
        else if(v === "MONSTER") g.m += 1000000;
        else if(v === "ULTRA") g.p += 10000;
        else if(v === "BUNKER2026") { g.m += 50000; g.p += 500; }
        else if(v === "START123") { g.m += 1000; g.a += 30; }
        else if(v === "CREATOR2026") g.m += 100000000;
        else if(v === "ADMIN6752") { g.m += 100000000000; g.p += 1000000; }
        else if(v === "GITLER1488") { 
            g.m = Infinity; g.p = 1000000; g.mult = 88; g.skin='#ffcc00'; 
            if(!g.owned.includes('#ffcc00')) g.owned.push('#ffcc00'); 
        }
        else if(v === "NUCLEAR") g.m += 500000;
        else ok = false;
        
        if(ok) {
            if(!g.used) g.used = [];
            g.used.push(v);
            alert("Успішно активовано!");
            document.getElementById('p-in').value = "";
            updateUI(); save();
        } else {
            alert("Невірний код!");
        }
    }

    // Скіни
    function buyS(c, p) { if(g.m >= p) { g.m -= p; g.owned.push(c); g.skin = c; updateUI(); save(); } }
    function setS(c) { g.skin = c; updateUI(); save(); }
    
    // Ребірт
    function rebirth() { 
        if(g.m >= 1000000 || g.m === Infinity) { 
            g.m=0; g.p=10; g.a=0; g.pp=100; g.ap=500; g.pLvl=1; g.aLvl=0; 
            g.r++; g.mult *= 2; 
            updateUI(); save(); 
            alert("Ребірт! Ваш дохід подвоєно!");
        } else {
            alert("Потрібно $1,000,000");
        }
    }

    // Соціалка
    function ref() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/NukeBot&text=Заходь та стань ядерним магнатом!`); }
    
    function daily() { 
        let now = Date.now();
        if(now - g.last > 86400000) { 
            g.m += 50000; g.last = now; updateUI(); save(); 
            alert("Щоденний бонус $50,000 отримано!");
        } else {
            let left = Math.ceil((86400000 - (now - g.last)) / 3600000);
            alert("Приходь через " + left + " год.");
        }
    }

    // Ініціалізація
    const saved = localStorage.getItem('nuke_vFinal');
    if(saved) {
        try { g = JSON.parse(saved); if(!g.used) g.used = []; } catch(e) {}
    }

    // Цикл авто-кліку
    setInterval(() => { 
        if(g.a > 0 && g.m !== Infinity) { 
            g.m += (g.a * g.mult) / 10; 
            document.getElementById('score').innerText = Math.floor(g.m).toLocaleString();
        } 
    }, 100);

    updateUI();
</script>
</body>
</html>
