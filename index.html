
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuke Clicker Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #0f0; --bg: #000; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: var(--neon); margin: 0; padding: 10px; text-align: center; }
        
        #score-display { font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }
        
        /* КОНТАКТ ПРОДАВЦЯ */
        .buy-codes { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem; }
        .buy-codes a { color: #fff; text-decoration: none; font-weight: bold; border-bottom: 1px dashed #fff; }

        #nuke-icon { width: 180px; height: 180px; cursor: pointer; filter: drop-shadow(0 0 15px var(--neon)); transition: 0.1s; }
        #nuke-icon:active { transform: scale(0.9); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .box { border: 2px solid var(--neon); padding: 15px; border-radius: 12px; background: rgba(0,25,0,0.9); }
        .btn { width: 100%; padding: 12px; background: #000; color: var(--neon); border: 2px solid var(--neon); cursor: pointer; font-weight: bold; border-radius: 8px; }
        
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--neon); color: var(--neon); text-align: center; border-radius: 8px; margin-top: 10px; }
        #log { font-size: 0.8rem; margin-top: 5px; color: var(--gold); }
    </style>
</head>
<body>

<div class="buy-codes">
    🛒 КУПИТИ ПРОМО ТА АДМІНКУ: <br>
    Пиши власнику: <a href="https://t.me/Csgo321123" target="_blank">@Csgo321123</a>
</div>

<div id="score-display">0</div>
<div id="mut-tag" style="color:var(--gold); font-weight:bold;">GEN 0: ATOM</div>

<svg id="nuke-icon" viewBox="0 0 100 100" onclick="tap(event)">
    <path d="M50 5 L35 40 L35 80 L65 80 L65 40 Z" fill="currentColor" />
    <path d="M35 80 L20 95 L80 95 L65 80 Z" fill="currentColor" opacity="0.6" />
    <circle cx="50" cy="55" r="7" fill="#000" />
</svg>

<div class="grid">
    <div class="box"><small>UP ТАП</small><br><button class="btn" onclick="buy('p')">$<span id="p-price">100</span></button></div>
    <div class="box"><small>UP АВТО</small><br><button class="btn" onclick="buy('a')">$<span id="a-price">500</span></button></div>
</div>

<div class="box" style="margin-top: 15px;">
    <input type="text" id="promo-input" placeholder="ВВЕДІТЬ КУПЛЕНИЙ КОД...">
    <button class="btn" style="margin-top: 8px; background: var(--neon); color: #000;" onclick="usePromo()">АКТИВУВАТИ</button>
    <div id="log">READY TO CONNECT</div>
</div>

<script>
    // FIREBASE CONFIG (ВСТАВ СВОЄ)
    const firebaseConfig = { apiKey: "...", databaseURL: "..." }; 
    // firebase.initializeApp(firebaseConfig);

    const tg = window.Telegram.WebApp;
    tg.expand();

    let g = { m: 0, p: 10, a: 0, pp: 100, ap: 500, used: [] };

    // УСІ КОДИ
    const CODES = {
        "RICH": 100000,
        "MONSTER": 1000000,
        "NUCLEAR": 500000,
        "BUNKER2026": 55000,
        "ULTRA": 1000000,
        "START123": 1000,
        "CREATOR2026": 50000000,
        "ADMIN6752": 100000000,
        "GITLER1488": 999999999999
    };

    function updateUI() {
        document.getElementById('score-display').innerText = g.m >= 1e12 ? "∞" : Math.floor(g.m).toLocaleString();
        document.getElementById('p-price').innerText = Math.floor(g.pp).toLocaleString();
        document.getElementById('a-price').innerText = Math.floor(g.ap).toLocaleString();
    }

    function tap(e) {
        g.m += g.p;
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        updateUI();
    }

    function usePromo() {
        let val = document.getElementById('promo-input').value.toUpperCase().trim();
        let log = document.getElementById('log');
        
        if(g.used.includes(val)) { log.innerText = "КОД ВЖЕ ВИКОРИСТАНО"; return; }
        
        if(CODES[val]) {
            g.m += CODES[val];
            g.used.push(val);
            log.innerText = "УСПІШНО АКТИВОВАНО!";
            document.getElementById('promo-input').value = "";
        } else {
            log.innerText = "НЕВІРНИЙ КОД. КУПИ У @Csgo321123";
        }
        updateUI();
    }

    function buy(type) {
        if(type === 'p' && g.m >= g.pp) { g.m -= g.pp; g.p += 15; g.pp *= 1.8; }
        if(type === 'a' && g.m >= g.ap) { g.m -= g.ap; g.a += 25; g.ap *= 1.8; }
        updateUI();
    }

    setInterval(() => { if(g.a > 0) { g.m += g.a / 10; updateUI(); } }, 100);
    updateUI();
</script>
</body>
</html>
