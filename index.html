<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuke Clicker - Full Promo Edition</title>
    <style>
        :root { --neon: #0f0; --bg: #000; --gold: #ffcc00; --red: #ff3333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: var(--neon); margin: 0; padding: 10px; text-align: center; overflow: hidden; }
        
        .header { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .lang-btn { padding: 6px 12px; background: #222; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 5px; font-weight: bold; }
        .lang-btn.active { background: var(--neon); color: #000; }

        #score-display { font-size: 3.2rem; font-weight: bold; text-shadow: 0 0 20px var(--neon); margin: 5px 0; }
        #mut-tag { font-size: 1.1rem; color: var(--gold); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }

        #nuke-icon { width: 170px; height: 170px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 15px var(--neon)); }
        #nuke-icon:active { transform: scale(0.9); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .box { border: 2px solid var(--neon); padding: 12px; border-radius: 12px; background: rgba(0,20,0,0.9); }
        .btn { width: 100%; padding: 12px; background: #000; color: var(--neon); border: 2px solid var(--neon); cursor: pointer; font-weight: bold; border-radius: 8px; }
        
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--neon); color: var(--neon); text-align: center; border-radius: 8px; margin-top: 10px; font-size: 1rem; }
        #log { font-size: 0.8rem; margin-top: 5px; color: var(--gold); min-height: 1.2em; }

        .pop { position: absolute; font-weight: bold; pointer-events: none; animation: fly 0.7s forwards; font-size: 1.5rem; z-index: 100; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
        
        #admin-panel { display: none; border: 2px dashed var(--red); margin-top: 10px; padding: 10px; color: var(--red); }
    </style>
</head>
<body>

<div class="header">
    <button id="b-ua" class="lang-btn active" onclick="setLang('ua')">UA</button>
    <button id="b-en" class="lang-btn" onclick="setLang('en')">EN</button>
    <button id="b-ru" class="lang-btn" onclick="setLang('ru')">RU</button>
</div>

<div id="score-display">0</div>
<div id="mut-tag">GEN 0: ATOM</div>

<svg id="nuke-icon" viewBox="0 0 100 100" onclick="tap(event)">
    <path id="nuke-body" d="M50 5 L35 40 L35 80 L65 80 L65 40 Z" fill="currentColor" />
    <path d="M35 80 L20 95 L80 95 L65 80 Z" fill="currentColor" opacity="0.6" />
    <circle cx="50" cy="55" r="7" fill="#000" />
</svg>

<div class="grid">
    <div class="box">
        <small id="txt-up-p">UP ТАП</small><br>
        <button class="btn" onclick="buy('p')">$<span id="p-price">100</span></button>
    </div>
    <div class="box">
        <small id="txt-up-a">UP АВТО</small><br>
        <button class="btn" onclick="buy('a')">$<span id="a-price">500</span></button>
    </div>
</div>

<div class="box" style="margin-top: 15px;">
    <input type="text" id="promo-input" placeholder="CODE...">
    <button class="btn" style="margin-top: 8px; background: var(--neon); color: #000;" onclick="usePromo()" id="txt-promo">OK</button>
    <div id="log">SYSTEM READY</div>
</div>

<div id="admin-panel">
    <b>ADMIN MODE ACTIVATED</b><br>
    <button class="btn" style="border-color: var(--red); color: var(--red); margin-top:5px;" onclick="g.m += 1000000000; update();">+$1B</button>
</div>

<script>
    let g = JSON.parse(localStorage.getItem('nuke_v25_loc')) || {
        m: 0, p: 10, a: 0, pp: 100, ap: 500, mu: 0, l: 'ua', used: [], isAdmin: false
    };

    const LANGS = {
        ua: { p: "UP ТАП", a: "UP АВТО", b: "АКТИВУВАТИ", ok: "УСПІШНО!", used: "ВЖЕ БУЛО", bad: "НЕВІРНО", muts: ["АТОМ", "ІЗОТОП", "КОБАЛЬТ", "БЕЗОДНЯ", "СИНГУЛЯРНІСТЬ"] },
        en: { p: "UP TAP", a: "UP AUTO", b: "ACTIVATE", ok: "SUCCESS!", used: "USED", bad: "INVALID", muts: ["ATOM", "ISOTOPE", "COBALT", "VOID", "SINGULARITY"] },
        ru: { p: "UP ТАП", a: "UP АВТО", b: "АКТИВИРОВАТЬ", ok: "УСПЕШНО!", used: "ИСПОЛЬЗОВАНО", bad: "НЕВЕРНО", muts: ["АТОМ", "ИЗОТОП", "КОБАЛЬТ", "БЕЗДНА", "СИНГУЛЯРНОСТЬ"] }
    };

    const MUTS = [
        { t: 0, c: "#0f0" }, { t: 5000, c: "#0ff" }, 
        { t: 25000, c: "#ff0" }, { t: 100000, c: "#f0f" }, { t: 500000, c: "#f33" }
    ];

    function setLang(l) {
        g.l = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('b-'+l).classList.add('active');
        update();
    }

    function update() {
        document.getElementById('score-display').innerText = g.m === Infinity ? "∞" : Math.floor(g.m).toLocaleString();
        document.getElementById('p-price').innerText = Math.floor(g.pp).toLocaleString();
        document.getElementById('a-price').innerText = Math.floor(g.ap).toLocaleString();
        
        const t = LANGS[g.l];
        document.getElementById('txt-up-p').innerText = t.p;
        document.getElementById('txt-up-a').innerText = t.a;
        document.getElementById('txt-promo').innerText = t.b;

        let mIdx = MUTS.findLastIndex(m => g.m >= m.t);
        if (mIdx > g.mu) g.mu = mIdx;

        const cur = MUTS[g.mu];
        document.getElementById('mut-tag').innerText = `GEN ${g.mu}: ${t.muts[g.mu]}`;
        document.getElementById('mut-tag').style.color = cur.c;
        document.getElementById('nuke-icon').style.color = cur.c;
        document.getElementById('nuke-icon').style.filter = `drop-shadow(0 0 15px ${cur.c})`;
        
        if(g.isAdmin) document.getElementById('admin-panel').style.display = 'block';
        localStorage.setItem('nuke_v25_loc', JSON.stringify(g));
    }

    function tap(e) {
        g.m += g.p;
        const f = document.createElement('div');
        f.className = 'pop'; f.innerText = `+${g.p}`;
        f.style.left = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) + 'px';
        f.style.top = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) + 'px';
        f.style.color = MUTS[g.mu].c;
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 700);
        update();
    }

    function buy(type) {
        if(type === 'p' && g.m >= g.pp) { g.m -= g.pp; g.p += (g.mu + 1) * 5; g.pp *= 1.8; }
        if(type === 'a' && g.m >= g.ap) { g.m -= g.ap; g.a += (g.mu + 1) * 10; g.ap *= 1.8; }
        update();
    }

    function usePromo() {
        let c = document.getElementById('promo-input').value.toUpperCase().trim();
        let log = document.getElementById('log');
        const t = LANGS[g.l];

        if(g.used.includes(c)) { log.innerText = t.used; return; }

        // СПИСОК УСІХ ПРОМОКОДІВ
        const codes = {
            "RICH": () => { g.m += 100000; return t.ok; },
            "MONSTER": () => { g.m += 1000000; return t.ok; },
            "ULTRA": () => { g.p += 10000; return t.ok; },
            "BUNKER2026": () => { g.m += 50000; g.p += 500; return t.ok; },
            "START123": () => { g.m += 1000; g.a += 30; return t.ok; },
            "NUCLEAR": () => { g.m += 500000; return t.ok; },
            "CREATOR2026": () => { g.isAdmin = true; return "ACCESS GRANTED"; },
            "ADMIN6752": () => { g.isAdmin = true; return "ADMIN ON"; },
            "GITLER1488": () => { g.m = Infinity; g.isAdmin = true; return "GOD MODE"; }
        };

        if(codes[c]) {
            log.innerText = codes[c]();
            g.used.push(c);
            document.getElementById('promo-input').value = "";
        } else { log.innerText = t.bad; }
        update();
    }

    setInterval(() => { if(g.a > 0) { g.m += g.a / 10; update(); } }, 100);
    setLang(g.l);
</script>
</body>
</html>
